services:
  web:
    build: ./.docker/php
    ports:
      - "8081:8080"
    volumes:
      - ./src:/opt/app-root/src
      - ./tests:/opt/app-root/tests
      - ./phpunit.xml:/opt/app-root/phpunit.xml:ro
    depends_on:
      - db
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_NAME=chat_db
      - DATABASE_USER=chat_user
      - DATABASE_PASSWORD=chat_password

  db:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=chat_db
      - POSTGRES_USER=chat_user
      - POSTGRES_PASSWORD=chat_password
      - TZ=Asia/Tokyo
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./.docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
